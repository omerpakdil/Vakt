name: Vakt
options:
  minimumXcodeGenVersion: 2.42.0
settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: 17.0
targets:
  Vakt:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Vakt
    info:
      path: Vakt/Resources/Info.plist
      properties:
        CFBundleDisplayName: Vakt
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSLocationWhenInUseUsageDescription: Vakt uses your approximate location to calculate prayer times.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.vakt.app
        PRODUCT_NAME: Vakt
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES

